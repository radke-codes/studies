<html>
<head>
  <title>Exemplo de Box Sizing</title>
  <style>
    .box {
      width: 200px;
      height: 100px;
      background-color: lightblue;
      border: 5px solid darkblue;
      box-sizing: border-box; /* Inclui a borda e o preenchimento no tamanho total */
    }
  </style>
</head>
<body>
  <h2>Exemplo de Box Sizing</h2>
  <div class="box"></div>
</body>
</html>
