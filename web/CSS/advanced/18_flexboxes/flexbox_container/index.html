<html>
<head>
  <title>Exemplo de Flexbox Container</title>
  <style>
    .flex-container {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      height: 200px;
      background-color: lightgray;
      padding: 10px;
    }

    .flex-item {
      background-color: lightblue;
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>
<body>
  <h2>Exemplo de Flexbox Container</h2>
  <div class="flex-container">
    <div class="flex-item">Item 1</div>
    <div class="flex-item">Item 2</div>
    <div class="flex-item">Item 3</div>
  </div>
</body>
</html>
