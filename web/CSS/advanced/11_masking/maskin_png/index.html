<html>
<head>
  <title>Masking Example</title>
  <style>
    .mask1 {
      -webkit-mask-image: url('Star_wars2.png');
      mask-image: url('Star_wars2.png');
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
      width: 300px; /* Example size */
      height: 300px; /* Example size */
    }
  </style>
</head>
<body>
    <img class="mask1" src="image1.jpg" alt="Example Image">
</body>
</html>
