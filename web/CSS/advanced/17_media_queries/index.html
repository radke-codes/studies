<html>
<head>
  <title>Exemplo de Media Queries</title>
  <style>
    .container {
      width: 100%;
      background-color: lightgray;
      padding: 20px;
    }

    @media screen and (max-width: 600px) {
      .container {
        background-color: lightblue;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Exemplo de Media Queries</h2>
    <p>Redimensione a janela do navegador para ver a mudança de cor.</p>
  </div>
</body>
</html>
