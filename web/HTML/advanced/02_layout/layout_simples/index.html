<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Simples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        nav {
            background-color: #444;
            padding: 1rem;
        }

        nav a {
            color: white;
            margin-right: 1.5rem;
            text-decoration: none;
        }

        nav a:hover {
            color: #ffd700;
        }

        main {
            display: flex;
            min-height: calc(100vh - 200px);
        }

        sidebar {
            width: 20%;
            background-color: #f0f0f0;
            padding: 1.5rem;
        }

        article {
            width: 80%;
            padding: 1.5rem;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meu Site</h1>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">Sobre</a>
        <a href="#services">Serviços</a>
        <a href="#contact">Contato</a>
    </nav>

    <main>
        <sidebar>
            <h3>Menu Lateral</h3>
            <ul>
                <li><a href="#">Link 1</a></li>
                <li><a href="#">Link 2</a></li>
                <li><a href="#">Link 3</a></li>
            </ul>
        </sidebar>

        <article>
            <h2>Conteúdo Principal</h2>
            <p>Este é um layout simples com header, navegação, sidebar e conteúdo principal.</p>
            <p>A página possui um design responsivo e limpo.</p>
        </article>
    </main>

    <footer>
        <p>&copy; 2024 Todos os direitos reservados.</p>
    </footer>
</body>
</html>
